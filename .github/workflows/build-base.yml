name: Build and push recorder base image
on:
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - 'main'
    paths:
      - 'docker-build/Dockerfile.base' # Triggers on changes to the base Dockerfile

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker-build/Dockerfile.base
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-recorder:base-${{ matrix.arch }}
          provenance: false # To prevent manifest list error

  push-manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Create and push manifest
        run: |
          docker manifest create ${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-recorder:base \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-recorder:base-amd64 \
            --amend ${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-recorder:base-arm64
          docker manifest push ${{ secrets.DOCKERHUB_USERNAME }}/plugnmeet-recorder:base
